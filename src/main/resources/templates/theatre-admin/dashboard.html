<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theater Management | CineSmart</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Montserrat', sans-serif; }
        .stat-card { background: #111; border: 1px solid #222; border-radius: 20px; padding: 25px; height: 100%; }
        .admin-card { background: #111; border: 1px solid #222; border-radius: 20px; padding: 30px; margin-bottom: 30px; }
        .table { color: #fff; vertical-align: middle; }
        .table thead th { color: #666; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; border: none; }
        .progress { background: #222; border-radius: 10px; height: 8px !important; }
        .btn-action { font-size: 0.75rem; font-weight: 700; border-radius: 8px; padding: 10px 20px; text-decoration: none; }
        .btn-add { background: #e50914; color: white; border: none; }
        .btn-delete { color: #ff4d4d; border: 1px solid #333; }
        .btn-delete:hover { background: #ff4d4d; color: white; }
        .show-row { padding: 12px 0; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <div>
            <h2 class="fw-bold">Theater Control Center</h2>
            <p class="text-secondary">Real-time monitoring and inventory management.</p>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/theatre-admin/screen/add}" class="btn btn-outline-light btn-action">Add Screen</a>
            <a th:href="@{/theatre-admin/show/add}" class="btn btn-add btn-action">Schedule Show</a>
        </div>
    </div>

    <div class="row g-4 mb-5">
        <div class="col-md-4">
            <div class="stat-card">
                <span class="text-secondary small">TOTAL REVENUE</span>
                <h2 class="fw-bold text-success mt-2" th:text="${totalRevenue != null ? '₹' + totalRevenue : '₹0'}"></h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <span class="text-secondary small">TICKETS SOLD TODAY</span>
                <h2 class="fw-bold text-light mt-2" th:text="${totalTicketsSold}"></h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card d-flex align-items-center justify-content-between">
                <div>
                    <span class="text-secondary small">INVENTORY</span>
                    <h5 class="fw-bold mt-2">Manage Snacks</h5>
                </div>
                <a th:href="@{/theatre-admin/snack/add}" class="btn btn-add btn-action">+ Add Item</a>
            </div>
        </div>
    </div>

    <div class="admin-card">
        <h5 class="fw-bold mb-4">📺 Live Screen & Show Schedule</h5>
        <div class="table-responsive">
            <table class="table">
                <thead>
                <tr>
                    <th>Screen</th>
                    <th>Movie / Time</th>
                    <th>Occupancy</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="scr : ${screens}">
                    <td class="fw-bold" th:text="${scr.screenName}"></td>
                    <td>
                        <div th:each="s : ${shows}" th:if="${s.screen != null and s.screen.id == scr.id}" class="show-row">
                            <div class="fw-bold text-danger" th:text="${s.movie.title}"></div>
                            <small class="text-secondary" th:text="${s.startTime}"></small>
                        </div>
                    </td>
                    <td>
                        <div th:each="s : ${shows}" th:if="${s.screen != null and s.screen.id == scr.id}" class="show-row">
                            <div class="progress mb-1"><div class="progress-bar bg-danger" th:style="'width:' + (${(scr.totalSeats - s.availableSeats) * 100 / (scr.totalSeats > 0 ? scr.totalSeats : 1)}) + '%'"></div></div>
                            <small class="text-secondary" th:text="(${scr.totalSeats - s.availableSeats}) + ' / ' + ${scr.totalSeats}"></small>
                        </div>
                    </td>
                    <td>
                        <div th:each="s : ${shows}" th:if="${s.screen != null and s.screen.id == scr.id}" class="show-row">
                            <a th:href="@{/theatre-admin/show/delete/{id}(id=${s.id})}" class="btn btn-delete btn-action" onclick="return confirm('Cancel this show?')">Cancel</a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="admin-card">
        <h5 class="fw-bold mb-4">🥤 Canteen Inventory</h5>
        <table class="table">
            <thead><tr><th>Item</th><th>Price</th><th>Stock</th><th>Action</th></tr></thead>
            <tbody>
            <tr th:each="snack : ${allSnacks}">
                <td class="fw-bold" th:text="${snack.itemName}"></td>
                <td class="text-secondary" th:text="'₹' + ${snack.price}"></td>
                <td th:text="${snack.availableStock}"></td>
                <td><a th:href="@{/theatre-admin/snack/delete/{id}(id=${snack.id})}" class="btn btn-delete btn-action">Remove</a></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
