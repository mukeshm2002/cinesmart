<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CineSmart - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', sans-serif; }
        .register-card { background-color: #1e1e1e; border: 1px solid #2d2d2d; border-radius: 12px; }
        .btn-danger { background-color: #e50914; border: none; }
        .btn-danger:hover { background-color: #b81d24; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

<div class="container" style="max-width: 480px;">
    <div class="card register-card p-4 shadow-lg">
        <div class="text-center mb-3">
            <h3 class="fw-bold text-danger">Join CineSmart 🎬</h3>
            <p class="text-muted small">Book and Resell Tickets Instantly</p>
        </div>

        <div th:if="${error}" class="alert alert-danger small py-2" th:text="${error}"></div>

        <form th:action="@{/register}" th:object="${user}" method="post">
            <div class="mb-3">
                <label class="form-label text-muted small">Full Name</label>
                <input type="text" th:field="*{name}" class="form-control bg-dark text-white border-secondary" required placeholder="Mukesh MK">
            </div>
            <div class="mb-3">
                <label class="form-label text-muted small">Email Address</label>
                <input type="email" th:field="*{email}" class="form-control bg-dark text-white border-secondary" required placeholder="mk@example.com">
            </div>
            <div class="mb-3">
                <label class="form-label text-muted small">Mobile Number</label>
                <input type="text" th:field="*{mobileNumber}" class="form-control bg-dark text-white border-secondary" required placeholder="9876543210">
            </div>
            <div class="mb-4">
                <label class="form-label text-muted small">Password</label>
                <input type="password" th:field="*{password}" class="form-control bg-dark text-white border-secondary" required placeholder="Create a strong password">
            </div>
            <div class="mb-3">
                <label class="form-label text-muted small">Select Account Type</label>
                <select th:field="*{role}" class="form-select bg-dark text-white border-secondary" required>
                    <option th:value="${T(com.mk.cinesmart.model.UserRole).ROLE_USER}">Standard User (Movie Goer)</option>
                    <option th:value="${T(com.mk.cinesmart.model.UserRole).ROLE_SUPER_ADMIN}">Super Admin (Theater Owner)</option>
                </select>
            </div>
            <button type="submit" class="btn btn-danger w-100 fw-bold mb-3">Register</button>
        </form>

        <div class="text-center small">
            <span class="text-muted">Already have an account? </span>
            <a th:href="@{/login}" class="text-danger text-decoration-none fw-bold">Sign In here</a>
        </div>
    </div>
</div>

</body>
</html>
