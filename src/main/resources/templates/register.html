<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join CineSmart | Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=2025&auto=format&fit=crop');
            background-size: cover; background-position: center; color: #fff;
            font-family: 'Montserrat', sans-serif; min-height: 100vh;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .register-card {
            background: rgba(10, 10, 10, 0.9); border: 1px solid #333;
            border-radius: 20px; padding: 40px; width: 100%; max-width: 450px;
            backdrop-filter: blur(10px); box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .form-control {
            background: #1a1a1a !important; border: 1px solid #444; color: #fff !important;
            border-radius: 10px; padding: 12px; margin-bottom: 15px;
        }
        .form-control:focus { border-color: #e50914; box-shadow: 0 0 0 0.2rem rgba(229, 9, 20, 0.25); }
        .btn-register {
            background: #e50914; color: white; padding: 12px; border-radius: 10px;
            font-weight: 700; transition: 0.3s; border: none; width: 100%;
        }
        .btn-register:hover { background: #ff0a16; transform: translateY(-2px); }
        label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #bbb; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="register-card">
    <div th:if="${param.step == null}">
        <div class="text-center mb-4">
            <h3 class="fw-bold">Create Account</h3>
            <p class="text-secondary small">Join CineSmart and book your shows</p>
        </div>

        <div th:if="${error}" class="alert alert-danger p-2 text-center small" th:text="${error}"></div>

        <form th:action="@{/register}" th:object="${user}" method="post" id="regForm">
            <label>Full Name</label>
            <input type="text" th:field="*{name}" class="form-control" required placeholder="Mukesh MK">
            <label>Email Address</label>
            <input type="email" th:field="*{email}" class="form-control" required placeholder="name@email.com">
            <label>Mobile Number</label>
            <input type="tel" th:field="*{mobileNumber}" class="form-control" required pattern="[0-9]{10}" placeholder="9876543210">
            <label>Password</label>
            <input type="password" th:field="*{password}" class="form-control" required placeholder="••••••••">

            <button type="submit" class="btn btn-register" id="submitBtn">Send OTP</button>
        </form>
    </div>

    <div th:if="${param.step != null and param.step[0] == 'otp'}">
        <div class="text-center mb-4">
            <h4 class="fw-bold">Verify Email</h4>
            <p class="text-secondary small">Enter the 6-digit OTP sent to your email.</p>
        </div>

        <div th:if="${error}" class="alert alert-danger p-2 text-center small" th:text="${error}"></div>

        <form th:action="@{/verify-otp}" method="post" id="otpForm">
            <label>Enter 6-digit OTP</label>
            <input type="number" name="otp" class="form-control" required placeholder="000000" autofocus autocomplete="off">
            <button type="submit" class="btn btn-register" id="otpBtn">Verify & Complete</button>
        </form>
    </div>

    <div class="text-center mt-3 small" th:if="${param.step == null}">
        Already a member? <a th:href="@{/login}" class="text-white fw-bold text-decoration-none">Sign In</a>
    </div>
</div>

<script>
    document.getElementById("regForm")?.addEventListener("submit", function() {
        const btn = document.getElementById("submitBtn");
        btn.disabled = true;
        btn.innerText = "Sending OTP...";
    });

    document.getElementById("otpForm")?.addEventListener("submit", function() {
        const btn = document.getElementById("otpBtn");
        btn.disabled = true;
        btn.innerText = "Verifying...";
    });
</script>

</body>
</html>
