<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineSmart | Munchies</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Montserrat', sans-serif; }

        .snack-card { background: #111; border: 1px solid #222; border-radius: 20px; transition: 0.3s; }
        .snack-card:hover { border-color: #e50914; box-shadow: 0 10px 20px rgba(229, 9, 20, 0.1); }
        .snack-img { height: 160px; object-fit: cover; border-radius: 20px 20px 0 0; }

        .btn-qty { background: #333; border: none; color: #fff; width: 35px; height: 35px; border-radius: 10px; font-weight: bold; transition: 0.2s; }
        .btn-qty:hover { background: #e50914; }

        /* Responsive Summary */
        .sticky-summary {
            position: sticky; top: 20px; background: #0f0f0f;
            border-radius: 20px; border: 1px solid #333; padding: 25px;
        }
        .btn-confirm { background: #e50914; color: #fff; font-weight: 700; padding: 15px; border-radius: 12px; border: none; transition: 0.3s; }
        .btn-confirm:hover { background: #ff0a16; }

        @media (max-width: 991px) {
            .sticky-summary { position: fixed; bottom: 0; left: 0; right: 0; border-radius: 20px 20px 0 0; z-index: 1000; padding: 15px; border: 1px solid #444; }
            .container { padding-bottom: 200px; } /* summary-க்கு இடம் விட */
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row">
        <div class="col-lg-8">
            <h2 class="fw-bold mb-4">🍿 Refreshments</h2>
            <div class="row row-cols-2 row-cols-md-3 g-3">
                <div class="col" th:each="snack : ${allSnacks}">
                    <div class="card snack-card h-100">
                        <img th:src="${snack.imageUrl}" class="snack-img" alt="Item">
                        <div class="card-body p-3">
                            <h6 class="fw-bold mb-1" th:text="${snack.itemName}">Item</h6>
                            <p class="text-danger fw-bold mb-3" th:text="'₹' + ${snack.price}">₹0</p>
                            <div class="d-flex align-items-center gap-2">
                                <button class="btn-qty" th:onclick="updateQty([[${snack.id}]], [[${snack.itemName}]], [[${snack.price}]], -1)">-</button>
                                <span th:id="'qty-' + ${snack.id}" class="fw-bold mx-2">0</span>
                                <button class="btn-qty" th:onclick="updateQty([[${snack.id}]], [[${snack.itemName}]], [[${snack.price}]], 1)">+</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="sticky-summary shadow-lg">
                <h5 class="fw-bold mb-3">Order Summary</h5>
                <div class="d-flex justify-content-between mb-2 small text-secondary">
                    <span>Seats:</span>
                    <span class="text-white fw-bold" th:text="${selectedSeats}"></span>
                </div>
                <div id="snackCartList" class="my-3 border-top border-bottom border-secondary py-2 overflow-auto" style="max-height: 200px;">
                    <p class="text-muted text-center small">No items added</p>
                </div>
                <div class="d-flex justify-content-between fs-4 fw-bold mb-3">
                    <span>Total:</span>
                    <span id="liveTotal" class="text-success">₹0</span>
                </div>
                <button class="btn btn-confirm w-100" onclick="proceedToBill()">Pay Securely</button>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const showId = /*[[${show.id}]]*/ 0;
    const seats = /*[[${selectedSeats}]]*/ '';
    const basePrice = /*[[${show.basePrice}]]*/ 0;
    const ticketTotalAmount = seats.split(',').length * basePrice;

    let cart = {};

    function updateQty(id, name, price, change) {
        if (!cart[id]) cart[id] = { name: name, price: price, qty: 0 };
        cart[id].qty = Math.max(0, cart[id].qty + change);
        if (cart[id].qty === 0) delete cart[id];

        document.getElementById('qty-' + id).innerText = cart[id] ? cart[id].qty : 0;
        renderCart();
    }

    function renderCart() {
        const cartBox = document.getElementById('snackCartList');
        let snackTotal = 0;
        let html = '';

        Object.keys(cart).forEach(id => {
            const item = cart[id];
            snackTotal += (item.price * item.qty);
            html += `<div class="d-flex justify-content-between mb-1 small">
                        <span>${item.name} x${item.qty}</span>
                        <span class="fw-bold">₹${item.price * item.qty}</span>
                     </div>`;
        });

        cartBox.innerHTML = html || '<p class="text-muted text-center small">No items added</p>';
        document.getElementById('liveTotal').innerText = '₹' + (ticketTotalAmount + snackTotal);
    }

    function proceedToBill() {
        let snackTotal = 0;
        let snackStrings = [];
        let snackIds = [];
        let quantities = [];

        Object.keys(cart).forEach(id => {
            snackTotal += (cart[id].price * cart[id].qty);
            snackStrings.push(`${cart[id].name}x${cart[id].qty}`);
            snackIds.push(id);
            quantities.push(cart[id].qty);
        });

        const snackDetails = snackStrings.length > 0 ? snackStrings.join(', ') : 'None';
        window.location.href = `/user/show/${showId}/payment?seats=${encodeURIComponent(seats)}&ticketAmount=${ticketTotalAmount}&snackAmount=${snackTotal}&snackDetails=${encodeURIComponent(snackDetails)}&snackIds=${snackIds.join(',')}&quantities=${quantities.join(',')}`;
    }

    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById('liveTotal').innerText = '₹' + ticketTotalAmount;
    });
</script>
</body>
</html>
