<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CineSmart - Food & Beverages</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', sans-serif; }
        .snack-card { background-color: #1e1e1e; border: 1px solid #2d2d2d; border-radius: 12px; overflow: hidden; }
        .snack-img { height: 150px; object-fit: cover; width: 100%; background-color: #333; }
        .quantity-btn { width: 35px; height: 35px; border-radius: 50%; font-weight: bold; }
    </style>
</head>
<body>

<div class="container mt-5 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold text-success">🍿 Add Combo Snacks & Drinks</h3>
            <p class="text-muted small">Pre-book canteens items to skip the interval lines!</p>
        </div>
        <button class="btn btn-warning fw-bold text-dark px-4" onclick="proceedToBill()">Skip & Continue →</button>
    </div>

    <div class="row">
        <div class="col-md-8">
            <div th:if="${#lists.isEmpty(allSnacks)}" class="text-muted my-4">
                Canteen is currently closed. You can skip to payment.
            </div>

            <div class="row row-cols-1 row-cols-md-3 g-3">
                <div class="col" th:each="snack : ${allSnacks}">
                    <div class="card snack-card h-100 shadow-sm text-white">
                        <img th:src="${snack.imageUrl != null ? snack.imageUrl : 'https://placehold.co/300x150/png?text=Snack'}" class="snack-img" alt="Snack">
                        <div class="card-body d-flex flex-column">
                            <h6 class="fw-bold mb-1" th:text="${snack.itemName}">Snack Name</h6>
                            <p class="text-success fw-bold small" th:text="'₹' + ${snack.price}">₹0</p>

                            <div class="d-flex align-items-center justify-content-between mt-auto pt-2 border-top border-secondary">
                                <button class="btn btn-outline-light quantity-btn btn-sm"
                                        th:onclick="updateQty([[${snack.id}]], [[${snack.itemName}]], [[${snack.price}]], -1)">-</button>
                                <span th:id="'qty-' + ${snack.id}" class="fw-bold fs-5">0</span>
                                <button class="btn btn-success quantity-btn btn-sm text-dark"
                                        th:onclick="updateQty([[${snack.id}]], [[${snack.itemName}]], [[${snack.price}]], 1)">+</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4 ps-md-4 mt-4 mt-md-0">
            <div class="card bg-dark text-white border-secondary p-3 shadow position-sticky" style="top: 20px;">
                <h5 class="fw-bold text-danger">Order Summary</h5>
                <hr class="border-secondary">

                <div class="d-flex justify-content-between small text-muted mb-2">
                    <span>Selected Seats:</span>
                    <span class="text-warning fw-bold" th:text="${selectedSeats}"></span>
                </div>

                <div id="snackCartList" class="my-3 small text-white-50">
                    <p class="text-center italic text-muted">No snacks added yet.</p>
                </div>

                <hr class="border-secondary">
                <div class="d-flex justify-content-between fw-bold text-success fs-5">
                    <span>Total Pay:</span>
                    <span id="liveTotal">₹0</span>
                </div>

                <button class="btn btn-success w-100 fw-bold mt-3 text-dark fs-6" onclick="proceedToBill()">Proceed to Payment 🔒</button>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const showId = /*[[${show.id}]]*/ 0;
    const seats = /*[[${selectedSeats}]]*/ '';
    const basePrice = /*[[${show.basePrice}]]*/ 0;

    const ticketCount = seats ? seats.split(',').length : 0;
    const ticketTotalAmount = ticketCount * basePrice;

    let cart = {};

    function updateQty(id, name, price, change) {
        if (!cart[id]) {
            cart[id] = { name: name, price: price, qty: 0 };
        }
        cart[id].qty += change;
        if (cart[id].qty <= 0) delete cart[id];

        document.getElementById('qty-' + id).innerText = cart[id] ? cart[id].qty : 0;
        renderCart();
    }

    function renderCart() {
        const cartBox = document.getElementById('snackCartList');
        let snackTotal = 0;
        let html = '';

        Object.keys(cart).forEach(id => {
            const item = cart[id];
            snackTotal += (item.price * item.qty);
            html += `<div class="d-flex justify-content-between mb-1">
                        <span>${item.name} (x${item.qty})</span>
                        <span>₹${item.price * item.qty}</span>
                     </div>`;
        });

        cartBox.innerHTML = html || '<p class="text-center italic text-muted">No snacks added yet.</p>';
        document.getElementById('liveTotal').innerText = '₹' + (ticketTotalAmount + snackTotal);
    }

    function proceedToBill() {
        let snackTotal = 0;
        let snackStrings = [];

        Object.keys(cart).forEach(id => {
            const item = cart[id];
            snackTotal += (item.price * item.qty);
            snackStrings.push(`${item.name}x${item.qty}`);
        });

        const snackDetailsParam = snackStrings.length > 0 ? snackStrings.join(', ') : 'None';

        // Encoding for safety
        const encodedSeats = encodeURIComponent(seats);
        const encodedSnacks = encodeURIComponent(snackDetailsParam);

        window.location.href = `/user/show/${showId}/payment?seats=${encodedSeats}&ticketAmount=${ticketTotalAmount}&snackAmount=${snackTotal}&snackDetails=${encodedSnacks}`;
    }

    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById('liveTotal').innerText = '₹' + ticketTotalAmount;
    });
</script>
</body>
</html>
