<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineSmart | Premium Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Montserrat', sans-serif; }

        /* Glassmorphism Navbar */
        .navbar { background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(15px); padding: 1.2rem 2rem; border-bottom: 1px solid #1a1a1a; }
        .navbar-brand { font-weight: 800; letter-spacing: -1px; }

        /* Hero Section */
        .hero { height: 50vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(rgba(0,0,0,0.5), #050505), url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=1600'); background-size: cover; background-position: center; }
        .hero h1 { font-weight: 800; font-size: 3.5rem; letter-spacing: -2px; }

        /* Movie Card Premium Look */
        .movie-card { background: #0f0f0f; border: 1px solid #1a1a1a; border-radius: 16px; transition: 0.4s ease; overflow: hidden; position: relative; }
        .movie-card:hover { transform: translateY(-10px); border-color: #e50914; box-shadow: 0 10px 30px rgba(229, 9, 20, 0.25); }

        .movie-poster { height: 400px; object-fit: cover; transition: 0.5s; }
        .movie-card:hover .movie-poster { transform: scale(1.05); }

        .overlay { padding: 20px; }
        .movie-title { font-weight: 700; font-size: 1.25rem; margin-bottom: 5px; }

        .btn-netflix { background: #e50914; color: white; border-radius: 8px; font-weight: 600; padding: 12px; transition: 0.3s; }
        .btn-netflix:hover { background: #ff0a16; transform: scale(1.02); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <a class="navbar-brand text-danger fs-2" th:href="@{/user/home}">CINESMART</a>
    <div class="ms-auto">
        <a th:href="@{/user/history}" class="btn btn-outline-light btn-sm px-4">My Bookings</a>
    </div>
</nav>

<section class="hero">
    <div class="text-center">
        <h1 class="text-white">Experience Cinema</h1>
        <p class="text-secondary fs-5">Premium seats. Blockbusters. Seamless delivery.</p>
    </div>
</section>

<div class="container py-5">
    <h3 class="fw-bold mb-4">Now Playing</h3>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
        <div class="col" th:each="movie : ${movies}">
            <div class="card movie-card h-100">
                <img th:src="${movie.posterUrl}" class="card-img-top movie-poster" alt="Poster">
                <div class="overlay">
                    <h5 class="movie-title" th:text="${movie.title}">Movie Title</h5>
                    <p class="text-secondary small mb-3" th:text="${movie.genre}">Genre</p>
                    <a th:href="@{/user/movie/{id}(id=${movie.id})}" class="btn btn-netflix w-100">Book Now</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
