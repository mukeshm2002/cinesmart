<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CineSmart - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', sans-serif; }
        .navbar { background-color: #1e1e1e; border-bottom: 1px solid #2d2d2d; }
        .movie-card { background-color: #1e1e1e; border: 1px solid #2d2d2d; transition: transform 0.2s; border-radius: 10px; overflow: hidden; }
        .movie-card:hover { transform: scale(1.03); }
        .movie-poster { height: 350px; object-fit: cover; width: 100%; }
        .btn-netflix { background-color: #e50914; color: white; border: none; }
        .btn-netflix:hover { background-color: #b81d24; color: white; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark px-4 mb-4">
    <a class="navbar-brand fw-bold text-danger fs-3" th:href="@{/user/home}">🎬 CineSmart</a>
    <div class="ms-auto d-flex align-items-center">
        <a th:href="@{/user/history}" class="btn btn-outline-light btn-sm me-3 fw-bold">My Bookings</a>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-danger btn-sm fw-bold">Logout</button>
        </form>
    </div>
</nav>

<div class="container mb-5">
    <h4 class="fw-bold mb-4 text-warning">🔥 Now Showing In Theatres</h4>

    <div th:if="${param.error}" class="alert alert-danger" th:text="${param.error}"></div>

    <div class="row row-cols-1 row-cols-md-4 g-4">
        <div class="col" th:each="movie : ${movies}">
            <div class="card movie-card h-100 shadow">
                <img th:src="${movie.posterUrl}" class="card-img-top movie-poster" alt="Movie Poster">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title fw-bold" th:text="${movie.title}">Movie Title</h5>
                    <p class="text-muted small mb-1" th:text="${movie.genre} + ' | ' + ${movie.language}">Genre</p>
                    <p class="text-muted small" th:text="${movie.durationInMinutes} + ' Mins'"></p>
                    <a th:href="@{/user/movie/{id}(id=${movie.id})}" class="btn btn-netflix mt-auto w-100 fw-bold">Book Tickets</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
