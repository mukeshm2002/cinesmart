<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings | CineSmart</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Montserrat', sans-serif; }

        /* Ticket Stub Effect */
        .ticket-card {
            background: #111; border: 1px solid #222; border-radius: 20px;
            padding: 25px; transition: 0.4s; position: relative; overflow: hidden;
        }
        .ticket-card:hover { border-color: #e50914; transform: scale(1.01); }

        /* Status Badges */
        .badge-status { padding: 6px 12px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .bg-confirmed { background: #1a4d2e; color: #55e69e; }
        .bg-cancelled { background: #333; color: #aaa; }
        .bg-resale { background: #854d0e; color: #fde047; }

        .btn-action { border-radius: 8px; font-weight: 600; font-size: 0.8rem; padding: 8px 15px; }
        .btn-cancel { border: 1px solid #444; color: white; }
        .btn-sell { background: #e50914; color: white; border: none; }
    </style>
</head>
<body>

<div class="container py-5" style="max-width: 900px;">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h2 class="fw-bold">My Bookings</h2>
        <a th:href="@{/user/home}" class="btn btn-outline-light btn-sm">Explore More</a>
    </div>

    <div th:if="${param.success}" class="alert alert-success bg-transparent border-success text-success" th:text="${param.success}"></div>

    <div th:each="booking : ${bookings}" class="card ticket-card mb-4">
        <div class="row align-items-center">
            <div class="col-md-8">
                <h4 class="fw-bold mb-1" th:text="${booking.show.movie.title}">Movie Title</h4>
                <div class="text-secondary small mb-3">
                    <span th:text="${booking.show.showDate} + ' • ' + ${booking.show.startTime}"></span> |
                    <span th:text="${booking.show.screen.screenName}"></span>
                </div>
                <div class="d-flex gap-4">
                    <div>
                        <small class="text-muted d-block">SEATS</small>
                        <span class="fw-bold text-warning" th:text="${booking.selectedSeats}"></span>
                    </div>
                    <div>
                        <small class="text-muted d-block">BOOKING ID</small>
                        <span class="font-monospace" th:text="${booking.bookingId}"></span>
                    </div>
                </div>
            </div>

            <div class="col-md-4 text-md-end mt-4 mt-md-0">
                <h3 class="fw-bold mb-3" th:text="'₹' + ${booking.totalAmount}"></h3>

                <div class="mb-3">
                    <span class="badge-status"
                          th:classappend="${booking.status.name() == 'CONFIRMED' ? 'bg-confirmed' : (booking.status.name() == 'CANCELLED' ? 'bg-cancelled' : 'bg-resale')}"
                          th:text="${booking.status}"></span>
                </div>

                <div th:if="${booking.status.name() == 'CONFIRMED'}" class="d-flex gap-2 justify-content-md-end">
                    <form th:action="@{/user/booking/cancel/{id}(id=${booking.id})}" method="post">
                        <button type="submit" class="btn btn-action btn-cancel">Cancel</button>
                    </form>
                    <form th:action="@{/user/booking/resale/list/{id}(id=${booking.id})}" method="post">
                        <button type="submit" class="btn btn-action btn-sell">Sell Ticket</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
