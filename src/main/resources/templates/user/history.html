<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings | CineSmart</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Montserrat', sans-serif; }

        /* Ticket Design */
        .ticket-card {
            background: #111; border: 1px solid #222; border-radius: 20px;
            padding: 25px; transition: 0.3s; position: relative;
        }
        .ticket-card:hover { border-color: #e50914; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* Ticket Side-cuts */
        .ticket-card::before, .ticket-card::after {
            content: ''; position: absolute; top: 50%; width: 25px; height: 25px;
            background: #050505; border-radius: 50%;
        }
        .ticket-card::before { left: -15px; }
        .ticket-card::after { right: -15px; }

        /* Badges */
        .badge-status { padding: 6px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.5px; }
        .bg-confirmed { background: rgba(26, 77, 46, 0.3); color: #55e69e; border: 1px solid #1a4d2e; }

        .btn-action { border-radius: 10px; font-weight: 600; font-size: 0.8rem; padding: 10px 20px; transition: 0.3s; }
        .btn-cancel { background: transparent; border: 1px solid #444; color: #fff; }
        .btn-cancel:hover { background: #333; }
        .btn-sell { background: #e50914; color: white; border: none; }
        .btn-sell:hover { background: #ff0a16; }

        /* Responsive */
        @media (max-width: 768px) {
            .ticket-card { padding: 20px; }
            .btn-action { width: 100%; margin-bottom: 5px; }
        }
    </style>
</head>
<body>

<div class="container py-5" style="max-width: 800px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">My Bookings</h2>
        <a th:href="@{/user/home}" class="btn btn-outline-light btn-sm px-3">Explore</a>
    </div>

    <div th:if="${bookings.empty}" class="text-center py-5">
        <h5 class="text-secondary">No bookings found yet!</h5>
    </div>

    <div th:each="booking : ${bookings}" class="ticket-card mb-4">
        <div class="row align-items-center">
            <div class="col-md-8">
                <div class="d-flex align-items-center mb-2">
                    <h4 class="fw-bold mb-0 me-3" th:text="${booking.show.movie.title}">Movie Name</h4>
                    <span class="badge-status"
                          th:classappend="${booking.status.name() == 'CONFIRMED' ? 'bg-confirmed' : 'bg-secondary'}"
                          th:text="${booking.status}"></span>
                </div>

                <p class="text-secondary small mb-3">
                    <i class="fas fa-calendar-alt me-1"></i> <span th:text="${booking.show.showDate}"></span> •
                    <i class="fas fa-clock me-1"></i> <span th:text="${booking.show.startTime}"></span> |
                    <span th:text="${booking.show.screen.screenName}"></span>
                </p>

                <div class="row g-3">
                    <div class="col-6">
                        <small class="text-muted d-block text-uppercase" style="font-size: 0.6rem;">Seats</small>
                        <span class="fw-bold text-white" th:text="${booking.selectedSeats}"></span>
                    </div>
                    <div class="col-6">
                        <small class="text-muted d-block text-uppercase" style="font-size: 0.6rem;">Booking ID</small>
                        <span class="font-monospace text-white" th:text="${booking.bookingId}"></span>
                    </div>
                </div>
            </div>

            <div class="col-md-4 text-md-end mt-4 mt-md-0">
                <h3 class="fw-bold mb-3" th:text="'₹' + ${booking.totalAmount}"></h3>

                <div th:if="${booking.status.name() == 'CONFIRMED'}" class="d-grid gap-2">
                    <form th:action="@{/user/booking/cancel/{id}(id=${booking.id})}" method="post">
                        <button type="submit" class="btn btn-action btn-cancel w-100">Cancel</button>
                    </form>
                    <form th:action="@{/user/booking/resale/list/{id}(id=${booking.id})}" method="post">
                        <button type="submit" class="btn btn-action btn-sell w-100">Sell Ticket</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
