<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings | CineSmart</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Montserrat', sans-serif; }
        .ticket-card { background: #111; border: 1px solid #222; border-radius: 20px; padding: 25px; margin-bottom: 25px; transition: 0.3s; position: relative; }
        .ticket-card:hover { border-color: #e50914; }

        /* Ticket Cuts */
        .ticket-card::before, .ticket-card::after { content: ''; position: absolute; top: 45%; width: 20px; height: 20px; background: #050505; border-radius: 50%; }
        .ticket-card::before { left: -10px; } .ticket-card::after { right: -10px; }

        .badge-status { padding: 5px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: 700; }
        .bg-confirmed { background: rgba(85, 230, 158, 0.1); color: #55e69e; border: 1px solid #1a4d2e; }

        .btn-action { border-radius: 10px; font-weight: 600; font-size: 0.8rem; padding: 10px 15px; transition: 0.3s; }
        .btn-cancel { background: #222; border: none; color: #fff; }
        .btn-cancel:hover { background: #444; }
        .btn-sell { background: #e50914; color: white; border: none; }
    </style>
</head>
<body>

<div class="container py-5" style="max-width: 850px;">
    <h2 class="fw-bold mb-4">My Bookings</h2>

    <div th:if="${bookings.empty}" class="text-center py-5">
        <div class="display-1 text-secondary mb-3"><i class="fas fa-ticket-alt"></i></div>
        <h5 class="text-secondary">No bookings found!</h5>
        <a th:href="@{/user/home}" class="btn btn-danger mt-3">Book Your First Movie</a>
    </div>

    <div th:each="booking : ${bookings}" class="ticket-card">
        <div class="row align-items-center">
            <div class="col-md-8">
                <div class="d-flex align-items-center mb-2">
                    <h4 class="fw-bold mb-0 me-3" th:text="${booking.show.movie.title}">Movie Title</h4>
                    <span class="badge-status" th:classappend="${booking.status.name() == 'CONFIRMED' ? 'bg-confirmed' : 'bg-secondary'}" th:text="${booking.status}"></span>
                </div>

                <p class="text-secondary small mb-3">
                    <i class="fas fa-calendar-day me-1"></i> <span th:text="${booking.show.showDate}"></span> &nbsp; | &nbsp;
                    <i class="fas fa-clock me-1"></i> <span th:text="${#temporals.format(booking.show.startTime, 'hh:mm a')}"></span>
                </p>

                <div class="d-flex gap-4">
                    <div>
                        <small class="text-muted d-block text-uppercase" style="font-size: 0.6rem;">Seats</small>
                        <span class="fw-bold" th:text="${booking.selectedSeats}"></span>
                    </div>
                    <div th:if="${booking.snackDetails != null}">
                        <small class="text-muted d-block text-uppercase" style="font-size: 0.6rem;">Refreshments</small>
                        <span class="fw-bold text-warning small" th:text="${booking.snackDetails}"></span>
                    </div>
                </div>
            </div>

            <div class="col-md-4 text-md-end mt-4 mt-md-0">
                <h3 class="fw-bold mb-3" th:text="'₹' + ${booking.totalAmount}"></h3>
                <div th:if="${booking.status.name() == 'CONFIRMED'}" class="d-grid gap-2">
                    <form th:action="@{/user/booking/cancel/{id}(id=${booking.id})}" method="post" onsubmit="return confirm('Are you sure you want to cancel this booking?');">
                        <button type="submit" class="btn btn-action btn-cancel w-100">Cancel</button>
                    </form>
                    <form th:action="@{/user/booking/resale/list/{id}(id=${booking.id})}" method="post">
                        <button type="submit" class="btn btn-action btn-sell w-100">Sell Ticket</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
