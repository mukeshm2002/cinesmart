<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | CineSmart</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Montserrat', sans-serif; }
        .profile-container { max-width: 500px; margin: 80px auto; }
        .profile-card {
            background: #111; border: 1px solid #222; border-radius: 30px;
            padding: 50px 30px; text-align: center; position: relative;
        }
        .avatar { width: 130px; height: 130px; border-radius: 50%; border: 5px solid #e50914; margin-bottom: 20px; }
        .info-label { color: #666; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .info-value { font-size: 1.1rem; font-weight: 600; margin-bottom: 25px; display: block; }
        .btn-back { background: transparent; border: 1px solid #333; color: #fff; padding: 10px 30px; border-radius: 10px; }
        .btn-back:hover { background: #1a1a1a; color: #fff; }
    </style>
</head>
<body>

<div class="container profile-container">
    <div class="profile-card">
        <img src="https://ui-avatars.com/api/?name=User&background=e50914&color=fff&size=200" class="avatar" alt="User">

        <h2 class="fw-bold mb-4" th:text="${user.name}">UserName</h2>

        <div class="mt-4">
            <div class="info-label">Email Address</div>
            <span class="info-value" th:text="${user.email}">user@email.com</span>

            <div class="info-label">Phone Number</div>
            <span class="info-value" th:text="${user.phone != null ? user.phone : 'Not provided'}">+91 00000 00000</span>

            <div class="info-label">Membership</div>
            <span class="info-value text-danger fw-bold">CineSmart Premium</span>
        </div>

        <div class="mt-4">
            <a th:href="@{/user/home}" class="btn btn-back w-100">Back to Home</a>
        </div>
    </div>
</div>

</body>
</html>
