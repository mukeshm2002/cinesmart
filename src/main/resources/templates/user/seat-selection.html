<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineSmart | Select Seats</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Montserrat', sans-serif; }

        .theatre-room {
            background: #0a0a0a; border: 1px solid #222; padding: 40px;
            border-radius: 20px; overflow-x: auto; perspective: 1000px;
        }

        .cinema-screen {
            height: 4px; width: 70%; background: #fff; margin: 0 auto 50px auto;
            box-shadow: 0 0 20px rgba(255,255,255,0.5); border-radius: 5px;
        }

        .seat-grid { display: flex; flex-direction: column; align-items: center; }

        /* வளைவான வரிசை அமைப்புக்காக */
        .seat-row {
            display: flex; gap: 10px; margin-bottom: 12px; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .seat-row:nth-child(even) { transform: scale(0.98); }
        .seat-row:nth-child(3n) { margin-left: 15px; }

        .row-label { width: 30px; font-weight: 700; color: #555; font-size: 0.8rem; }

        .seat {
            width: 40px; height: 40px; background: #1a1a1a; border: 1px solid #333;
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; font-size: 0.75rem; font-weight: 600; color: #666;
        }
        .seat:hover:not(.booked) { border-color: #e50914; color: #fff; }
        .seat.selected { background: #e50914 !important; border: 1px solid #ff0a16; color: #fff; transform: scale(1.1); }
        .seat.booked { background: #111; opacity: 0.2; cursor: not-allowed; border: none; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 193, 7, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(255, 193, 7, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 193, 7, 0); }
        }
        .seat.resale { background: #ffc107; color: #000; border: 1px solid #d39e00; animation: pulse 2s infinite; }

        .legend-box { display: flex; gap: 20px; justify-content: center; margin-top: 40px; }
        .leg-circle { width: 14px; height: 14px; border-radius: 4px; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row">
        <div class="col-lg-8">
            <div class="theatre-room">
                <div class="cinema-screen"></div>

                <div class="seat-grid">
                    <div class="seat-row" th:each="r : ${#numbers.sequence(1, screen.totalRows)}">
                        <span class="row-label" th:text="${'R' + r}"></span>

                        <div th:each="s : ${#numbers.sequence(1, screen.seatsPerRow)}"
                             th:with="seatNo=${'R' + r + '-' + s}"
                             th:style="${s == (screen.seatsPerRow / 2) ? 'margin-right: 30px;' : ''}"> <div class="seat" th:id="${seatNo}"
                                                                                                            th:classappend="${(bookedSeats != null && #lists.contains(bookedSeats, seatNo)) ? 'booked' : (resaleSeats != null && #lists.contains(resaleSeats, seatNo)) ? 'resale' : 'available'}"
                                                                                                            onclick="toggleSeat(this)">
                            <span th:if="${resaleSeats != null && #lists.contains(resaleSeats, seatNo)}">R</span>
                            <span th:unless="${resaleSeats != null && #lists.contains(resaleSeats, seatNo)}" th:text="${s}"></span>
                        </div>
                        </div>
                    </div>
                </div>

                <div class="legend-box">
                    <div class="small"><span class="leg-circle" style="background:#1a1a1a; border:1px solid #333"></span> Available</div>
                    <div class="small"><span class="leg-circle" style="background:#e50914"></span> Selected</div>
                    <div class="small"><span class="leg-circle" style="background:#ffc107"></span> Resale</div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card bg-dark text-white border-0 p-4 rounded-4 shadow-lg">
                <h5 class="fw-bold mb-4">Your Selection</h5>
                <div class="display-6 text-danger mb-3" id="displaySeats">--</div>
                <div class="d-flex justify-content-between mb-4">
                    <span>Total Amount:</span>
                    <h4 id="totalAmount" class="fw-bold">₹0</h4>
                </div>
                <button class="btn btn-danger w-100 py-3 fw-bold" onclick="goToPayment()">PROCEED TO SNACKS</button>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const basePrice = /*[[${show.basePrice}]]*/ 0;
    const resalePremium = 50;
    let selectedSeatsList = [];
    let totalAmount = 0;

    function toggleSeat(element) {
        if (element.classList.contains('booked')) return;
        const isResale = element.classList.contains('resale');
        const price = isResale ? (basePrice + resalePremium) : basePrice;

        if (element.classList.contains('selected')) {
            element.classList.remove('selected');
            selectedSeatsList = selectedSeatsList.filter(id => id !== element.id);
            totalAmount -= price;
        } else {
            if (selectedSeatsList.length >= 5) return alert("Max 5 seats allowed!");
            element.classList.add('selected');
            selectedSeatsList.push(element.id);
            totalAmount += price;
        }
        document.getElementById('displaySeats').innerText = selectedSeatsList.length > 0 ? selectedSeatsList.join(', ') : '--';
        document.getElementById('totalAmount').innerText = '₹' + totalAmount;
    }

    function goToPayment() {
        if (selectedSeatsList.length === 0) return alert("Select at least one seat!");
        const showId = /*[[${show.id}]]*/ 0;
        window.location.href = `/user/show/${showId}/snacks?seats=${selectedSeatsList.join(',')}&total=${totalAmount}`;
    }
</script>
</body>
</html>
