<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineSmart | Select Seats</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Montserrat', sans-serif; }
        .theatre-room { background: #0a0a0a; border: 1px solid #222; padding: 40px; border-radius: 20px; overflow-x: auto; }
        .cinema-screen { height: 4px; width: 70%; background: #fff; margin: 0 auto 50px auto; box-shadow: 0 0 20px rgba(255,255,255,0.5); border-radius: 5px; }
        .seat-grid { display: flex; flex-direction: column; align-items: center; }
        .seat-row { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; justify-content: center; }
        .row-label { width: 30px; font-weight: 700; color: #555; font-size: 0.8rem; }
        .seat { width: 40px; height: 40px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.75rem; font-weight: 600; color: #666; }
        .seat.selected { background: #e50914 !important; border-color: #ff0a16; color: #fff; }
        .seat.booked { background: #111; opacity: 0.3; cursor: not-allowed; border: none; }
        .seat.resale { background: #ffc107; color: #000; border: 1px solid #d39e00; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row">
        <div class="col-lg-8">
            <div class="theatre-room">
                <div class="cinema-screen"></div>

                <div class="seat-grid">
                    <div class="seat-row" th:each="r : ${#numbers.sequence(1, screen.totalRows)}">
                        <span class="row-label" th:text="${'R' + r}"></span>

                        <th:block th:each="s : ${#numbers.sequence(1, screen.seatsPerRow)}">
                            <div th:with="seatNo=${'R' + r + '-' + s}"
                                 th:classappend="${s == (screen.seatsPerRow / 2) ? 'me-4' : ''}">

                                <div class="seat"
                                     th:id="${seatNo}"
                                     th:classappend="${(bookedSeats != null && #lists.contains(bookedSeats, seatNo)) ? 'booked' : ((resaleSeats != null && #lists.contains(resaleSeats, seatNo)) ? 'resale' : 'available')}"
                                     onclick="toggleSeat(this)">
                                    <span th:text="${(resaleSeats != null && #lists.contains(resaleSeats, seatNo)) ? 'R' : s}"></span>
                                </div>
                            </div>
                        </th:block>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card bg-dark text-white border-0 p-4 rounded-4 shadow-lg">
                <h5 class="fw-bold mb-4">Your Selection</h5>
                <div class="display-6 text-danger mb-3" id="displaySeats">--</div>
                <div class="d-flex justify-content-between mb-4">
                    <span>Total Amount:</span>
                    <h4 id="totalAmount" class="fw-bold">₹0</h4>
                </div>
                <button class="btn btn-danger w-100 py-3 fw-bold" onclick="goToPayment()">PROCEED TO SNACKS</button>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const basePrice = /*[[${show.basePrice}]]*/ 0;
    const resalePremium = 50;
    let selectedSeatsList = [];
    let totalAmount = 0;

    function toggleSeat(element) {
        if (element.classList.contains('booked')) return;
        const isResale = element.classList.contains('resale');
        const price = isResale ? (basePrice + resalePremium) : basePrice;

        if (element.classList.contains('selected')) {
            element.classList.remove('selected');
            selectedSeatsList = selectedSeatsList.filter(id => id !== element.id);
            totalAmount -= price;
        } else {
            if (selectedSeatsList.length >= 5) return alert("Max 5 seats allowed!");
            element.classList.add('selected');
            selectedSeatsList.push(element.id);
            totalAmount += price;
        }
        document.getElementById('displaySeats').innerText = selectedSeatsList.length > 0 ? selectedSeatsList.join(', ') : '--';
        document.getElementById('totalAmount').innerText = '₹' + totalAmount;
    }

    function goToPayment() {
        if (selectedSeatsList.length === 0) return alert("Select at least one seat!");
        const showId = /*[[${show.id}]]*/ 0;
        window.location.href = `/user/show/${showId}/snacks?seats=${selectedSeatsList.join(',')}&ticketAmount=${totalAmount}`;
    }
</script>
</body>
</html>
