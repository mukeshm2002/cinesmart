<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CineSmart | Select Seats</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Montserrat', sans-serif; }

        /* Entrance/Exit Signs */
        .theatre-room { background: #111; border: 1px solid #222; padding: 40px; border-radius: 20px; }
        .door-sign { color: #555; font-size: 0.7rem; letter-spacing: 2px; border: 1px solid #333; padding: 5px; border-radius: 4px; }

        /* Screen */
        .cinema-screen { height: 10px; width: 60%; background: #fff; margin: 0 auto 50px auto;
                         box-shadow: 0 0 50px #fff; border-radius: 50%; }

        /* Seat Grid with Aisles */
        .seat-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 10px; }
        .seat { width: 35px; height: 35px; background: #222; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; font-size: 0.7rem; }

        /* Gap for Aisle (Entrance/Exit logic) */
        .aisle { width: 40px; }

        .seat.selected { background: #e50914 !important; transform: scale(1.1); }
        .seat.booked { background: #333; cursor: not-allowed; opacity: 0.4; }
        .seat.resale { background: #ffc107; color: #000; animation: pulse 2s infinite; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row">
        <div class="col-lg-8 theatre-room">
            <div class="cinema-screen"></div>

            <div class="seat-grid">
                <div class="seat-row" th:each="r : ${#numbers.sequence(1, screen.totalRows)}">
                    <span class="row-label text-secondary me-3" th:text="${'Row ' + r}"></span>

                    <div th:each="s : ${#numbers.sequence(1, screen.seatsPerRow)}"
                         th:with="seatNo=${'R' + r + '-' + s}">

                        <div th:if="${s == (screen.seatsPerRow / 2 + 1)}" class="aisle"></div>

                        <div class="seat"
                             th:id="${seatNo}"
                             th:text="${s}"
                             th:classappend="${bookedSeats != null && #lists.contains(bookedSeats, seatNo)} ? 'booked' : (${resaleSeats != null && #lists.contains(resaleSeats, seatNo)} ? 'resale' : 'available')"
                             onclick="toggleSeat(this)">
                        </div>
                    </div>
                </div>
            </div>
            <div class="mt-4 d-flex justify-content-between">
                <span class="door-sign">ENTRANCE</span>
                <span class="door-sign">EXIT</span>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card bg-dark text-white border-0 p-4 rounded-4">
                <h4 class="fw-bold">Your Selection</h4>
                <div class="display-1 text-danger" id="displaySeats">--</div>
                <div class="d-flex justify-content-between mt-3">
                    <span>Total Amount:</span>
                    <h5 id="totalAmount" class="fw-bold">₹0</h5>
                </div>
                <button class="btn btn-danger w-100 py-3 mt-4 fw-bold" onclick="goToPayment()">PROCEED TO SNACKS</button>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const basePrice = /*[[${show.basePrice}]]*/ 0;
    let selectedSeatsList = [];

    function toggleSeat(element) {
        if (element.classList.contains('booked') || element.classList.contains('resale')) return;

        if (element.classList.contains('selected')) {
            element.classList.remove('selected');
            selectedSeatsList = selectedSeatsList.filter(id => id !== element.id);
        } else {
            element.classList.add('selected');
            selectedSeatsList.push(element.id);
        }
        document.getElementById('displaySeats').innerText = selectedSeatsList.length > 0 ? selectedSeatsList.join(', ') : '--';
        document.getElementById('totalAmount').innerText = '₹' + (selectedSeatsList.length * basePrice);
    }

    function goToPayment() {
        if (selectedSeatsList.length === 0) return alert("Select a seat!");
        const showId = /*[[${show.id}]]*/ 0;
        window.location.href = `/user/show/${showId}/snacks?seats=${selectedSeatsList.join(',')}`;
    }
</script>
</body>
</html>
