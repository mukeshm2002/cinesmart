<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineSmart | Upcoming Movies</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Montserrat', sans-serif; }

        /* Reuse Navbar Style */
        .navbar { background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(15px); padding: 1rem 2rem; border-bottom: 1px solid #1a1a1a; }

        /* Upcoming Cards */
        .upcoming-card { background: #111; border: 1px solid #222; border-radius: 16px; overflow: hidden; transition: 0.4s; }
        .upcoming-card:hover { border-color: #e50914; }
        .poster { height: 350px; object-fit: cover; }

        .badge-date { background: #e50914; padding: 5px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; }
        .movie-title { font-weight: 700; font-size: 1.2rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        <a class="navbar-brand text-danger fs-2" th:href="@{/user/home}">CINESMART</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto align-items-center gap-3">
                <li class="nav-item"><a class="nav-link" th:href="@{/user/home}">Home</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/user/upcoming}">Upcoming</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/user/history}">My Bookings</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container" style="padding-top: 120px;">
    <h2 class="fw-bold mb-5">Coming Soon to Theaters</h2>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-4 g-4">
        <div class="col" th:each="movie : ${upcomingMovies}">
            <div class="card upcoming-card h-100">
                <img th:src="${movie.posterUrl}" class="card-img-top poster" alt="Poster">
                <div class="card-body">
                    <span class="badge-date" th:text="${movie.releaseDate}">Date</span>
                    <h5 class="movie-title mt-3" th:text="${movie.title}">Movie Title</h5>
                    <p class="text-secondary small" th:text="${movie.genre}">Genre</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
