<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${movie.title} + ' | CineSmart'"></title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { background-color: #050505; color: #fff; font-family: 'Montserrat', sans-serif; }
        .poster-img { border-radius: 20px; transition: 0.5s; box-shadow: 0 20px 40px rgba(0,0,0,0.5); width: 100%; }
        .synopsis-box { background: rgba(255,255,255,0.03); padding: 25px; border-radius: 20px; border-left: 4px solid #e50914; }
        .showtime-card {
            background: #111; border: 1px solid #222; border-radius: 15px; padding: 20px; width: 160px;
            transition: 0.4s; text-decoration: none; color: white;
        }
        .showtime-card:hover { border-color: #e50914; transform: translateY(-5px); background: #000; }
        .badge-price { color: #ffc107; font-weight: 700; font-size: 0.9rem; margin-bottom: 10px;}
        .btn-book { background: #e50914; color: white; font-weight: 600; border-radius: 8px; border: none; padding: 8px 0; width: 100%; transition: 0.3s; }
        .btn-book:hover { background: #ff0a16; }
    </style>
</head>
<body>

<div class="container py-5">
    <a th:href="@{/user/home}" class="text-secondary text-decoration-none mb-4 d-block"><i class="fas fa-arrow-left"></i> Back to Movies</a>

    <div class="row">
        <div class="col-md-4 mb-4">
            <img th:src="${movie.posterUrl}" class="img-fluid poster-img" alt="Poster">
        </div>

        <div class="col-md-8">
            <h1 class="display-4 fw-bold mb-0" th:text="${movie.title}">Movie Title</h1>
            <div class="d-flex align-items-center gap-3 mt-2 mb-4">
                <span class="badge bg-danger" th:text="${movie.genre}">Genre</span>
                <span class="text-secondary" th:text="${movie.language}">Language</span>
                <span class="text-secondary"><i class="far fa-clock"></i>
                    <span th:text="${movie.durationInMinutes / 60} + 'h ' + ${movie.durationInMinutes % 60} + 'm'"></span>
                </span>
            </div>

            <div class="synopsis-box">
                <h5 class="fw-bold mb-3">Synopsis</h5>
                <p class="text-secondary lead fs-6" th:text="${movie.description}"></p>
            </div>

            <h5 class="mt-5 mb-4">Available Showtimes</h5>

            <div class="d-flex flex-wrap gap-3" th:if="${not #lists.isEmpty(shows)}">
                <div th:each="show : ${shows}" th:if="${show != null and show.screen != null}">
                    <div class="showtime-card text-center">
                        <small class="text-muted d-block" th:text="${show.showDate}"></small>

                        <h4 class="fw-bold my-2"
                            th:if="${show.startTime != null}"
                            th:text="${#temporals.format(show.startTime, 'hh:mm a')}">
                        </h4>
                        <h4 class="fw-bold my-2" th:if="${show.startTime == null}">--:--</h4>

                        <div class="badge-price" th:text="'₹' + ${show.basePrice}"></div>

                        <a th:if="${show.availableSeats > 0}"
                           th:href="@{/user/show/{showId}/seats(showId=${show.id})}"
                           class="btn btn-book">Book Now</a>
                        <button th:if="${show.availableSeats == 0}" class="btn btn-secondary w-100" disabled>Housefull</button>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(shows)}" class="text-muted">
                No shows available at the moment.
            </div>
        </div>
    </div>
</div>

</body>
</html>
