<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${movie.title} + ' - Details'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', sans-serif; }
        .details-container { background-color: #1e1e1e; border: 1px solid #2d2d2d; border-radius: 12px; }
        .showtime-badge { background-color: #2d2d2d; color: #fff; border: 1px solid #444; transition: 0.2s; text-decoration: none; }
        .showtime-badge:hover { background-color: #ffc107; color: #000; border-color: #ffc107; }
    </style>
</head>
<body>

<div class="container mt-5">
    <a th:href="@{/user/home}" class="btn btn-outline-light btn-sm mb-4">← Back to Movies</a>

    <div class="row p-4 details-container shadow-lg">
        <div class="col-md-4 text-center">
            <img th:src="${movie.posterUrl}" class="img-fluid rounded shadow" style="max-height: 450px; border: 1px solid #333;" alt="Poster">
        </div>

        <div class="col-md-8 ps-md-5 mt-4 mt-md-0">
            <h1 class="fw-bold text-danger mb-2" th:text="${movie.title}">Movie Title</h1>
            <h6 class="text-warning mb-3" th:text="${movie.genre} + ' • ' + ${movie.language} + ' • ' + ${movie.durationInMinutes} + ' Mins'"></h6>

            <h5 class="fw-bold text-muted mt-4">Synopsis</h5>
            <p class="text-light" style="line-height: 1.6;" th:text="${movie.description}">Movie Description</p>

            <hr class="border-secondary my-4">

            <h5 class="fw-bold text-success mb-3">🕒 Select Show Time</h5>

            <div th:if="${#lists.isEmpty(shows)}" class="text-muted small">
                No shows scheduled for this movie currently. Check back later!
            </div>

            <div class="d-flex flex-wrap gap-3">
                <div th:each="show : ${shows}">
                    <a th:href="@{/user/show/{showId}/seats(showId=${show.id})}" class="badge p-3 fs-6 showtime-badge rounded shadow-sm text-center">
                        <span class="d-block text-uppercase small fw-bold text-warning" th:text="${show.showDate}">Date</span>
                        <span class="fs-5 fw-bold" th:text="${show.startTime}">10:00 AM</span>
                        <span class="d-block text-muted small mt-1" th:text="'₹' + ${show.basePrice}">Price</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
