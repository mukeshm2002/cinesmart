<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${movie.title} + ' | CineSmart'"></title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { background-color: #050505; color: #fff; font-family: 'Montserrat', sans-serif; }
        .poster-img { border-radius: 20px; transition: 0.5s; box-shadow: 0 20px 40px rgba(0,0,0,0.5); width: 100%; }
        .synopsis-box { background: rgba(255,255,255,0.03); padding: 25px; border-radius: 20px; border-left: 4px solid #e50914; }

        /* Cast Style */
        .cast-img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid #333; }

        /* Button Style */
        .btn-netflix { background: #e50914; color: white; border-radius: 12px; font-weight: 700; padding: 15px 30px; border: none; transition: 0.3s; }
        .btn-netflix:hover { background: #ff0a16; transform: scale(1.02); }

        /* Modal Styles */
        .showtime-card {
            background: #111; border: 1px solid #222; border-radius: 15px; padding: 15px; width: 180px;
            transition: 0.4s; text-decoration: none; color: white; display: block;
        }
        .showtime-card:hover { border-color: #e50914; transform: translateY(-5px); background: #000; }
        .badge-price { color: #ffc107; font-weight: 700; font-size: 0.9rem; margin-top: 5px;}
        .theatre-name { color: #e50914; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container py-5">
    <a th:href="@{/user/home}" class="text-secondary text-decoration-none mb-4 d-block"><i class="fas fa-arrow-left"></i> Back to Movies</a>

    <div class="row">
        <div class="col-md-4 mb-4">
            <img th:src="${movie.posterUrl}" class="img-fluid poster-img" alt="Poster">
        </div>

        <div class="col-md-8">
            <h1 class="display-4 fw-bold mb-0" th:text="${movie.title}">Movie Title</h1>
            <div class="d-flex align-items-center gap-3 mt-2 mb-4">
                <span class="badge bg-danger" th:text="${movie.genre}">Genre</span>
                <span class="text-secondary" th:text="${movie.language}">Language</span>
                <span class="text-secondary"><i class="far fa-clock"></i>
                    <span th:text="${movie.durationInMinutes / 60} + 'h ' + ${movie.durationInMinutes % 60} + 'm'"></span>
                </span>
            </div>

            <div class="mb-4" th:if="${movie.actorNames != null and not #lists.isEmpty(movie.actorNames)}">
                <h5 class="fw-bold mb-3">Cast</h5>
                <div class="d-flex gap-3 overflow-auto pb-2">
                    <div th:each="i : ${#numbers.sequence(0, movie.actorNames.size() - 1)}" class="text-center">
                        <img th:src="${movie.actorImages[i]}" class="cast-img" alt="Actor">
                        <p class="small mt-2 mb-0" th:text="${movie.actorNames[i]}"></p>
                    </div>
                </div>
            </div>

            <div class="synopsis-box">
                <h5 class="fw-bold mb-3">Synopsis</h5>
                <p class="text-secondary lead fs-6" th:text="${movie.description}"></p>
            </div>

            <div class="mt-5">
                <button type="button" class="btn btn-netflix btn-lg" data-bs-toggle="modal" data-bs-target="#showtimeModal">
                    <i class="fas fa-ticket-alt me-2"></i> Book Tickets
                </button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="showtimeModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content" style="background: #0f0f0f; border: 1px solid #222; border-radius: 20px;">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold">Available Shows</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <div class="d-flex flex-wrap gap-3" th:if="${not #lists.isEmpty(shows)}">
                    <div th:each="show : ${shows}" th:if="${show != null and show.screen != null}">
                        <a th:href="@{/user/show/{showId}/seats(showId=${show.id})}" class="showtime-card text-center">
                            <div class="theatre-name" th:text="${show.screen.theatre.name}">Theatre</div>
                            <small class="text-white-50 d-block" th:text="'Screen ' + ${show.screen.screenNumber}"></small>
                            <hr class="border-secondary my-2">
                            <small class="text-secondary" th:text="${#temporals.format(show.showDate, 'dd MMM')}"></small>
                            <h5 class="fw-bold my-1" th:text="${#temporals.format(show.startTime, 'hh:mm a')}"></h5>
                            <div class="badge-price" th:text="'₹' + ${show.basePrice}"></div>
                        </a>
                    </div>
                </div>
                <div th:if="${#lists.isEmpty(shows)}" class="text-center text-muted py-4">No shows available.</div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
