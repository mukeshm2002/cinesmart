<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css}" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', sans-serif; }

        .payment-container {
            max-width: 600px;
            margin: 50px auto;
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header-text { color: #28a745; font-weight: bold; margin-bottom: 20px; text-align: center; }

        .summary-box {
            background: #252525;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .total-row {
            font-size: 1.4rem;
            color: #ffc107;
            font-weight: bold;
            border-top: 1px solid #444;
            padding-top: 10px;
        }

        .btn-pay {
            background-color: #28a745;
            color: #000;
            font-weight: bold;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn-pay:hover { background-color: #218838; color: #fff; }
    </style>
</head>
<body>
<div class="payment-container">
    <h2 class="header-text">Confirm Your Booking</h2>

    <div class="summary-box">
        <div class="detail-row"><span>Seats:</span> <span th:text="${selectedSeats}"></span></div>
        <div class="detail-row"><span>Ticket Price:</span> <span>₹<span th:text="${ticketAmount}"></span></span></div>
        <div class="detail-row"><span>Snacks:</span> <span>₹<span th:text="${snackAmount}"></span></span></div>
        <div class="detail-row" style="font-size: 0.9rem; color: #aaa;">
            <span>Details:</span> <span th:text="${snackDetails}"></span>
        </div>

        <div class="detail-row total-row">
            <span>Total Pay:</span> <span>₹<span th:text="${totalAmount}"></span></span>
        </div>
    </div>

    <form th:action="@{/user/booking/confirm}" method="post">
        <input type="hidden" name="showId" th:value="${show.id}">
        <input type="hidden" name="seats" th:value="${selectedSeats}">
        <input type="hidden" name="amount" th:value="${totalAmount}">

        <button type="submit" class="btn-pay">Pay & Confirm Booking 🔒</button>
    </form>
</div>
</body>
</html>
