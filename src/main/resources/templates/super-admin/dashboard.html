<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Super Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .table-dark { background-color: #1e1e1e; border: 1px solid #2d2d2d; }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-danger">🛡️ Super Admin Control Center</h2>
        <a th:href="@{/super-admin/movie/add}" class="btn btn-success fw-bold">+ Add New Movie</a>
    </div>

    <div th:if="${param.success}" class="alert alert-success py-2" th:text="${param.success}"></div>
    <div th:if="${param.deleted}" class="alert alert-warning py-2" th:text="${param.deleted}"></div>

    <div class="card bg-dark border-secondary p-3">
        <h5 class="fw-bold text-warning mb-3">Global Movie Master List</h5>
        <table class="table table-dark table-striped align-middle">
            <thead>
            <tr>
                <th>Poster</th>
                <th>Title</th>
                <th>Genre</th>
                <th>Language</th>
                <th>Duration</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="movie : ${movies}">
                <td><img th:src="${movie.posterUrl}" width="50" class="rounded shadow-sm" alt="Poster"></td>
                <td class="fw-bold" th:text="${movie.title}"></td>
                <td th:text="${movie.genre}"></td>
                <td th:text="${movie.language}"></td>
                <td th:text="${movie.durationInMinutes} + ' mins'"></td>
                <td>
                    <a th:href="@{/super-admin/movie/delete/{id}(id=${movie.id})}"
                       class="btn btn-danger btn-sm fw-bold"
                       onclick="return confirm('Are you sure you want to delete this movie? It will cascade to all active shows!');">Delete</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
