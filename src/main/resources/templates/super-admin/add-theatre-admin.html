<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Theatre Admin | CineSmart</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Montserrat', sans-serif; }
        .form-card { background: #111; border: 1px solid #222; border-radius: 20px; padding: 40px; }
        .form-control { background: #1a1a1a !important; border: 1px solid #333; color: white !important; border-radius: 10px; padding: 12px; }
        label { font-size: 0.8rem; text-transform: uppercase; color: #888; margin-bottom: 8px; }
        .btn-publish { background: #e50914; color: white; padding: 12px; border-radius: 10px; font-weight: 700; border: none; }
    </style>
</head>
<body>
<div class="container py-5" style="max-width: 600px;">
    <div class="card form-card">
        <h3 class="fw-bold mb-4">👤 Create Theatre Admin</h3>
        <form th:action="@{/super-admin/theatre-admin/save}" th:object="${user}" method="post">
            <div class="mb-3">
                <label>Full Name</label>
                <input type="text" th:field="*{name}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Email Address</label>
                <input type="email" th:field="*{email}" class="form-control" required>
            </div>
            <div class="mb-4">
                <label>Password</label>
                <input type="password" th:field="*{password}" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-publish w-100">Create Admin</button>
        </form>
    </div>
</div>
</body>
</html>
