<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Upcoming Movie | CineSmart</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Montserrat', sans-serif; }
        .form-card { background: #111; border: 1px solid #222; border-radius: 20px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .form-control { background: #1a1a1a !important; border: 1px solid #333; color: white !important; border-radius: 10px; padding: 12px; }
        .form-control:focus { border-color: #e50914; box-shadow: 0 0 0 0.2rem rgba(229, 9, 20, 0.25); }
        label { font-size: 0.8rem; text-transform: uppercase; color: #888; margin-bottom: 8px; }
        .btn-publish { background: #e50914; color: white; padding: 12px; border-radius: 10px; font-weight: 700; border: none; transition: 0.3s; }
        .btn-publish:hover { background: #ff0a16; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container py-5" style="max-width: 600px;">
    <div class="card form-card">
        <h3 class="fw-bold mb-4">🚀 Add Upcoming Movie</h3>

        <div th:if="${error}" class="alert alert-danger bg-transparent border-danger text-danger mb-4" th:text="${error}"></div>

        <form th:action="@{/super-admin/upcoming/save}" th:object="${movie}" method="post" enctype="multipart/form-data"
              onsubmit="this.querySelector('button').innerText='Uploading...'; this.querySelector('button').disabled=true;">

            <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}" />

            <div class="mb-3">
                <label>Movie Title</label>
                <input type="text" th:field="*{title}" class="form-control" required placeholder="Enter movie title">
            </div>

            <div class="mb-3">
                <label>Release Date</label>
                <input type="date" th:field="*{releaseDate}" class="form-control" required>
            </div>

            <div class="mb-4">
                <label>Movie Poster</label>
                <input type="file" name="posterFile" class="form-control" accept="image/*">
                <small class="text-secondary mt-2 d-block">Upload high quality poster (Max: 5MB).</small>
            </div>

            <button type="submit" class="btn btn-publish w-100">Add to Upcoming</button>
            <a th:href="@{/super-admin/dashboard}" class="btn btn-outline-secondary w-100 mt-3">Cancel</a>
        </form>
    </div>
</div>

</body>
</html>
