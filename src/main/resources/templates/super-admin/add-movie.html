<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${movie.id != null ? 'Edit Movie' : 'Add Movie'}">Admin | Movie</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Montserrat', sans-serif; }
        .form-card { background: #111; border: 1px solid #222; border-radius: 20px; padding: 40px; }
        .form-control, .form-select { background: #1a1a1a !important; border: 1px solid #333; color: white !important; border-radius: 10px; padding: 12px; }
        label { font-size: 0.8rem; text-transform: uppercase; color: #888; margin-bottom: 8px; }
        .btn-publish { background: #e50914; color: white; padding: 12px; border-radius: 10px; font-weight: 700; }
        .actor-row { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="container py-5" style="max-width: 700px;">
    <div class="card form-card">
        <h3 class="fw-bold mb-4" th:text="${movie.id != null ? '🎬 Edit Movie' : '🎬 Publish New Movie'}"></h3>

        <form th:action="@{/super-admin/movie/save}" th:object="${movie}" method="post" enctype="multipart/form-data">
            <input type="hidden" th:field="*{id}" />
            <input type="hidden" th:field="*{posterUrl}" />

            <div class="mb-4">
                <label>Movie Title</label>
                <input type="text" th:field="*{title}" class="form-control" required placeholder="Ex: Interstellar">
            </div>

            <div class="row">
                <div class="col-md-6 mb-4">
                    <label>Genre</label>
                    <input type="text" th:field="*{genre}" class="form-control" required>
                </div>
                <div class="col-md-6 mb-4">
                    <label>Language</label>
                    <input type="text" th:field="*{language}" class="form-control" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-4">
                    <label>Status</label>
                    <select th:field="*{status}" class="form-select" required>
                        <option value="RELEASED">Released</option>
                        <option value="UPCOMING">Upcoming</option>
                    </select>
                </div>
                <div class="col-md-6 mb-4">
                    <label>Release Date</label>
                    <input type="date" th:field="*{releaseDate}" class="form-control" required>
                </div>
            </div>

            <div class="mb-4">
                <label>Duration (Minutes)</label>
                <input type="number" th:field="*{durationInMinutes}" class="form-control" required>
            </div>

            <div class="mb-4">
                <label>Synopsis</label>
                <textarea th:field="*{description}" class="form-control" rows="3" required></textarea>
            </div>

            <div class="mb-4" th:if="${movie.posterUrl != null && !movie.posterUrl.isEmpty()}">
                <label>Current Poster</label><br>
                <img th:src="${movie.posterUrl}" width="120" class="rounded mb-2">
            </div>

            <div class="mb-4">
                <label>Movie Poster</label>
                <input type="file" name="posterFile" class="form-control" accept="image/*">
            </div>

            <div class="mb-4">
                <label>Cast Details</label>
                <div id="actorsContainer">
                    <div class="row actor-row mb-2">
                        <div class="col-md-6"><input type="text" name="actorNames" class="form-control" placeholder="Actor Name"></div>
                        <div class="col-md-6"><input type="file" name="actorFiles" class="form-control" accept="image/*"></div>
                    </div>
                </div>
                <button type="button" class="btn btn-sm btn-outline-light mt-2" onclick="addActor()">+ Add Actor</button>
            </div>

            <button type="submit" class="btn btn-publish w-100" th:text="${movie.id != null ? 'Update Movie' : 'Publish Movie'}"></button>
        </form>
    </div>
</div>

<script>
    function addActor() {
        const container = document.getElementById('actorsContainer');
        const div = document.createElement('div');
        div.className = 'row actor-row mb-2';
        div.innerHTML = `
            <div class="col-md-6"><input type="text" name="actorNames" class="form-control" placeholder="Actor Name"></div>
            <div class="col-md-6"><input type="file" name="actorFiles" class="form-control" accept="image/*"></div>
        `;
        container.appendChild(div);
    }
</script>
</body>
</html>
