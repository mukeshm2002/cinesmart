<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Add New Movie</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Montserrat', sans-serif; }

        .form-card {
            background: #111; border: 1px solid #222; border-radius: 20px;
            padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .form-control {
            background: #1a1a1a !important; border: 1px solid #333; color: white !important;
            border-radius: 10px; padding: 12px;
        }
        .form-control:focus { border-color: #e50914; box-shadow: none; }

        label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 8px; }

        .btn-publish { background: #e50914; color: white; padding: 12px; border-radius: 10px; font-weight: 700; transition: 0.3s; }
        .btn-publish:hover { background: #ff0a16; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container py-5" style="max-width: 700px;">
    <div class="card form-card">
        <h3 class="fw-bold mb-4">🎬 Publish New Movie</h3>

        <div th:if="${error}" class="alert alert-danger bg-transparent border-danger text-danger" th:text="${error}"></div>

        <form th:action="@{/super-admin/movie/save}" th:object="${movie}" method="post" enctype="multipart/form-data">
            <div class="mb-4">
                <label>Movie Title</label>
                <input type="text" th:field="*{title}" class="form-control" required placeholder="Ex: Interstellar">
            </div>

            <div class="row">
                <div class="col-md-6 mb-4">
                    <label>Genre</label>
                    <input type="text" th:field="*{genre}" class="form-control" required placeholder="Ex: Sci-Fi">
                </div>
                <div class="col-md-6 mb-4">
                    <label>Language</label>
                    <input type="text" th:field="*{language}" class="form-control" required placeholder="Ex: English">
                </div>
            </div>

            <div class="mb-4">
                <label>Duration (Minutes)</label>
                <input type="number" th:field="*{durationInMinutes}" class="form-control" required placeholder="Ex: 169">
            </div>

            <div class="mb-4">
                <label>Synopsis</label>
                <textarea th:field="*{description}" class="form-control" rows="4" required placeholder="Write the movie summary..."></textarea>
            </div>

            <div class="mb-4">
                <label>Movie Poster</label>
                <input type="file" name="posterFile" class="form-control" required accept="image/*">
                <small class="text-secondary mt-2 d-block">Recommended: 2:3 ratio, high quality.</small>
            </div>

            <div class="d-flex gap-3">
                <button type="submit" class="btn btn-publish w-100">Publish Movie</button>
                <a th:href="@{/super-admin/dashboard}" class="btn btn-outline-secondary w-100">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
