<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add New Movie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #fff; }
        .form-card { background-color: #1e1e1e; border: 1px solid #2d2d2d; border-radius: 10px; }
    </style>
</head>
<body>
<div class="container mt-5" style="max-width: 600px;">
    <div class="card form-card p-4 shadow">
        <h4 class="fw-bold text-warning mb-4">🎬 Upload Movie Details</h4>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/super-admin/movie/save}" th:object="${movie}" method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label small text-muted">Movie Title</label>
                <input type="text" th:field="*{title}" class="form-control bg-dark text-white border-secondary" required placeholder="eg: Captain America">
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label small text-muted">Genre</label>
                    <input type="text" th:field="*{genre}" class="form-control bg-dark text-white border-secondary" required placeholder="eg: Action">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label small text-muted">Language</label>
                    <input type="text" th:field="*{language}" class="form-control bg-dark text-white border-secondary" required placeholder="eg: Tamil">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label small text-muted">Duration (Minutes)</label>
                <input type="number" th:field="*{durationInMinutes}" class="form-control bg-dark text-white border-secondary" required placeholder="eg: 150">
            </div>
            <div class="mb-3">
                <label class="form-label small text-muted">Description / Synopsis</label>
                <textarea th:field="*{description}" class="form-control bg-dark text-white border-secondary" rows="3" required placeholder="Enter brief summary..."></textarea>
            </div>
            <div class="mb-4">
                <label class="form-label small text-muted">Movie Poster Image</label>
                <input type="file" name="posterFile" class="form-control bg-dark text-white border-secondary" required accept="image/*">
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success w-100 fw-bold">Publish Movie</button>
                <a th:href="@{/super-admin/dashboard}" class="btn btn-outline-light w-100 fw-bold">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
