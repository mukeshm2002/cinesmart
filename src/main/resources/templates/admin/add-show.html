<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theatre Admin | Schedule Show</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Montserrat', sans-serif; }

        .form-card {
            background: #111; border: 1px solid #222; border-radius: 20px;
            padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .form-select, .form-control {
            background: #1a1a1a !important; border: 1px solid #333; color: white !important;
            border-radius: 10px; padding: 12px;
        }
        .form-select:focus, .form-control:focus { border-color: #ffc107; box-shadow: none; }

        label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 8px; }

        .btn-schedule { background: #ffc107; color: #000; padding: 12px; border-radius: 10px; font-weight: 700; transition: 0.3s; }
        .btn-schedule:hover { background: #ffca2c; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container py-5" style="max-width: 600px;">
    <div class="card form-card">
        <h3 class="fw-bold mb-4 text-warning">🕒 Schedule Movie Show</h3>

        <div th:if="${error}" class="alert alert-danger bg-transparent border-danger text-danger" th:text="${error}"></div>

        <form th:action="@{/theatre-admin/show/save}" th:object="${show}" method="post">

            <div class="mb-4">
                <label>Select Movie</label>
                <select th:field="*{movie}" class="form-select" required>
                    <option value="" disabled selected>Select a movie...</option>
                    <option th:each="m : ${movies}" th:value="${m.id}" th:text="${m.title} + ' (' + ${m.language} + ')'"></option>
                </select>
            </div>

            <div class="mb-4">
                <label>Allocate Screen</label>
                <select th:field="*{screen}" class="form-select" required>
                    <option value="" disabled selected>Select a screen...</option>
                    <option th:each="s : ${screens}" th:value="${s.id}" th:text="${s.screenName}"></option>
                </select>
            </div>

            <div class="row">
                <div class="col-md-6 mb-4">
                    <label>Show Date</label>
                    <input type="date" th:field="*{showDate}" class="form-control" required>
                </div>
                <div class="col-md-6 mb-4">
                    <label>Start Time</label>
                    <input type="time" th:field="*{startTime}" class="form-control" required>
                </div>
            </div>

            <div class="mb-4">
                <label>Ticket Price (₹)</label>
                <input type="number" th:field="*{basePrice}" class="form-control" required min="50" placeholder="Ex: 150">
            </div>

            <div class="d-flex gap-3">
                <button type="submit" class="btn btn-schedule w-100">Publish Show</button>
                <a th:href="@{/theatre-admin/dashboard}" class="btn btn-outline-secondary w-100">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
