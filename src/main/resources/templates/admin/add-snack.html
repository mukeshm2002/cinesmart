<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Add Snack Item</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Montserrat', sans-serif; }

        .form-card {
            background: #111; border: 1px solid #222; border-radius: 20px;
            padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .form-control {
            background: #1a1a1a !important; border: 1px solid #333; color: white !important;
            border-radius: 10px; padding: 12px;
        }
        .form-control:focus { border-color: #28a745; box-shadow: none; }

        label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 8px; }

        .btn-save { background: #28a745; color: white; padding: 12px; border-radius: 10px; font-weight: 700; transition: 0.3s; }
        .btn-save:hover { background: #218838; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container py-5" style="max-width: 500px;">
    <div class="card form-card">
        <h3 class="fw-bold mb-4 text-success">🍿 Add New Snack</h3>

        <form th:action="@{/admin/snack/save}" th:object="${snack}" method="post" enctype="multipart/form-data">

            <div class="mb-4">
                <label>Snack Item Name</label>
                <input type="text" th:field="*{itemName}" class="form-control" required placeholder="Ex: Cheese Popcorn">
            </div>

            <div class="row">
                <div class="col-md-6 mb-4">
                    <label>Price (₹)</label>
                    <input type="number" th:field="*{price}" class="form-control" required placeholder="Ex: 150">
                </div>
                <div class="col-md-6 mb-4">
                    <label>Stock Count</label>
                    <input type="number" th:field="*{availableStock}" class="form-control" required placeholder="Ex: 100">
                </div>
            </div>

            <div class="mb-4">
                <label>Product Image</label>
                <input type="file" name="snackImageFile" class="form-control" accept="image/*">
            </div>

            <div class="d-flex gap-3">
                <button type="submit" class="btn btn-save w-100">Save Snack</button>
                <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary w-100">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
