<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CineSmart - Add Snack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #fff; }
        .form-card { background-color: #1e1e1e; border: 1px solid #2d2d2d; border-radius: 12px; }
    </style>
</head>
<body>
<div class="container mt-5" style="max-width: 500px;">
    <div class="card form-card p-4 shadow">
        <h4 class="fw-bold text-success mb-4">🍿 Add Canteen Snack Item</h4>

        <form th:action="@{/admin/snack/save}" th:object="${snack}" method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label small text-white-50">Snack Item Name</label>
                <input type="text" th:field="*{snackName}" class="form-control bg-dark text-white border-secondary" required placeholder="eg: Large Popcorn">
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label small text-white-50">Price (₹)</label>
                    <input type="number" th:field="*{price}" class="form-control bg-dark text-white border-secondary" required placeholder="eg: 120">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label small text-white-50">Initial Stock Count</label>
                    <input type="number" th:field="*{availableStock}" class="form-control bg-dark text-white border-secondary" required placeholder="eg: 50">
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label small text-white-50">Snack Product Image</label>
                <input type="file" name="snackImageFile" class="form-control bg-dark text-white border-secondary" accept="image/*">
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success w-100 fw-bold">Save Item</button>
                <a th:href="@{/admin/dashboard}" class="btn btn-outline-light w-100 fw-bold">Back</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
