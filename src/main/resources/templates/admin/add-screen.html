<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CineSmart - Configure Screen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .form-card { background-color: #1e1e1e; border: 1px solid #2d2d2d; border-radius: 12px; }
    </style>
</head>
<body>

<div class="container mt-5" style="max-width: 550px;">
    <div class="card form-card p-4 shadow-lg">
        <h4 class="fw-bold text-info mb-3">📺 Configure New Theater Screen</h4>
        <p class="text-muted small mb-4">Set up your 2D Matrix Row & Seats Grid Engine.</p>

        <div th:if="${error}" class="alert alert-danger py-2 small" th:text="${error}"></div>

        <form th:action="@{/admin/screen/save}" th:object="${screen}" method="post">
            <div class="mb-3">
                <label class="form-label small text-white-50">Screen Name</label>
                <input type="text" th:field="*{screenName}" class="form-control bg-dark text-white border-secondary" required placeholder="eg: Screen 1 (IMAX)">
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label small text-white-50">Total Rows</label>
                    <input type="number" th:field="*{totalRows}" class="form-control bg-dark text-white border-secondary" required min="1" max="26" placeholder="eg: 10">
                    <div class="form-text text-muted small">Vertical Grid (A-Z Map)</div>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label small text-white-50">Seats Per Row</label>
                    <input type="number" th:field="*{seatsPerRow}" class="form-control bg-dark text-white border-secondary" required min="1" max="30" placeholder="eg: 12">
                    <div class="form-text text-muted small">Horizontal Columns Count</div>
                </div>
            </div>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-info text-dark w-100 fw-bold">Build Screen Layout</button>
                <a th:href="@{/admin/dashboard}" class="btn btn-outline-light w-100 fw-bold">Back</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
