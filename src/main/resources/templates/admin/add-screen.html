<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theatre Admin | Configure Screen</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Montserrat', sans-serif; }

        .form-card {
            background: #111; border: 1px solid #222; border-radius: 20px;
            padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .form-control {
            background: #1a1a1a !important; border: 1px solid #333; color: white !important;
            border-radius: 10px; padding: 12px;
        }
        .form-control:focus { border-color: #0dcaf0; box-shadow: none; }

        label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 8px; }

        .btn-build { background: #0dcaf0; color: #000; padding: 12px; border-radius: 10px; font-weight: 700; transition: 0.3s; }
        .btn-build:hover { background: #08aed9; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container py-5" style="max-width: 550px;">
    <div class="card form-card">
        <h3 class="fw-bold mb-4 text-info">📺 Configure Theater Screen</h3>

        <div th:if="${error}" class="alert alert-danger bg-transparent border-danger text-danger" th:text="${error}"></div>

        <form th:action="@{/theatre-admin/screen/save}" th:object="${screen}" method="post">

            <div class="mb-4">
                <label>Screen Name</label>
                <input type="text" th:field="*{screenName}" class="form-control" required placeholder="Ex: Screen 1 - IMAX">
            </div>

            <div class="row">
                <div class="col-md-6 mb-4">
                    <label>Total Rows</label>
                    <input type="number" th:field="*{totalRows}" class="form-control" required min="1" max="26" placeholder="Ex: 10">
                    <small class="text-secondary mt-2 d-block">Vertical grid size</small>
                </div>
                <div class="col-md-6 mb-4">
                    <label>Seats Per Row</label>
                    <input type="number" th:field="*{seatsPerRow}" class="form-control" required min="1" max="30" placeholder="Ex: 12">
                    <small class="text-secondary mt-2 d-block">Horizontal columns count</small>
                </div>
            </div>

            <div class="d-flex gap-3">
                <button type="submit" class="btn btn-build w-100">Build Layout</button>
                <a th:href="@{/theatre-admin/dashboard}" class="btn btn-outline-secondary w-100">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
