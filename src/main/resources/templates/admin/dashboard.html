<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Theater Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .stat-card { background-color: #1e1e1e; border: 1px solid #2d2d2d; border-radius: 10px; }
        .table-dark { background-color: #1e1e1e; color: #fff; }
    </style>
</head>
<body>
<div class="container mt-5 mb-5">
    <h2 class="fw-bold text-warning mb-4">🏢 Theater Admin Control Center</h2>

    <div class="row g-4 mb-4">
        <div class="col-md-3">
            <div class="card stat-card p-3 text-center">
                <span class="text-muted small">💰 Total Revenue</span>
                <h3 class="fw-bold text-success mt-2" th:text="${totalRevenue != null ? '₹' + totalRevenue : '₹0'}">₹0</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card p-3 text-center">
                <span class="text-muted small">🍿 Snacks Sold Today</span>
                <h3 class="fw-bold text-warning mt-2" th:text="${totalSnacksSold != null ? totalSnacksSold : '0'}">0</h3>
            </div>
        </div>
        <div class="col-md-6 text-end">
            <a th:href="@{/admin/screen/add}" class="btn btn-primary btn-sm">Add Screen</a>
            <a th:href="@{/admin/show/add}" class="btn btn-warning btn-sm">Schedule Show</a>
        </div>
    </div>

    <div class="card bg-dark border-secondary p-4 mb-4">
        <h5 class="fw-bold text-info mb-3">📺 Screen & Show Live Status</h5>
        <div class="table-responsive">
            <table class="table table-dark table-hover align-middle">
                <thead>
                <tr>
                    <th>Screen</th>
                    <th>Current Show</th>
                    <th>Seat Matrix (Booked/Total)</th>
                    <th>Utilization</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="scr : ${screens}">
                    <td class="fw-bold" th:text="${scr.screenName}">Screen 1</td>
                    <td>
                        <div th:if="${scr.activeShow != null}">
                            <span class="text-white" th:text="${scr.activeShow.movie.title}">Movie</span><br>
                            <small class="text-muted" th:text="${scr.activeShow.startTime}"></small>
                        </div>
                        <span th:unless="${scr.activeShow != null}" class="text-muted">No Show</span>
                    </td>
                    <td>
                        <div th:if="${scr.activeShow != null}">
                            <div class="progress" style="height: 20px; width: 150px;">
                                <div class="progress-bar bg-danger"
                                     th:style="'width:' + (${(scr.totalSeats - scr.activeShow.availableSeats) * 100 / (scr.totalSeats > 0 ? scr.totalSeats : 1)}) + '%'">
                                </div>
                            </div>
                            <small th:text="(${scr.totalSeats - scr.activeShow.availableSeats}) + ' / ' + ${scr.totalSeats}"></small>
                        </div>
                        <span th:unless="${scr.activeShow != null}" class="text-muted">N/A</span>
                    </td>
                    <td>
                        <span th:if="${scr.activeShow != null}"
                              th:text="${((scr.totalSeats - scr.activeShow.availableSeats) * 100 / (scr.totalSeats > 0 ? scr.totalSeats : 1)) + '%'}">0%</span>
                        <span th:unless="${scr.activeShow != null}">0%</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card bg-dark border-secondary p-4">
        <h5 class="fw-bold text-success mb-3">🥤 Canteen Detailed Report</h5>
        <div class="row">
            <div class="col-md-6" th:each="snack : ${allSnacks}">
                <div class="d-flex justify-content-between p-2 border-bottom border-secondary">
                    <span th:text="${snack.snackName}">Item</span>
                    <span class="text-muted" th:text="'Stock: ' + ${snack.availableStock}">Stock: 0</span>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
