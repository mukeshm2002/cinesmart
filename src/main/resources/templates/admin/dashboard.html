<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Theater Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .stat-card { background-color: #1e1e1e; border: 1px solid #2d2d2d; border-radius: 10px; }
        .alert-card { border-left: 4px solid #ffc107; background-color: #2b2515; }
    </style>
</head>
<body>
<div class="container mt-5 mb-5">
    <h2 class="fw-bold text-warning mb-4">🏢 Theater Admin Control Center</h2>

    <div th:if="${param.success}" class="alert alert-success py-2" th:text="${param.success}"></div>

    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="card stat-card p-3 text-center">
                <span class="text-muted small text-uppercase">💰 Total Box Office Revenue</span>
                <h2 class="fw-bold text-success mt-2" th:text="'₹' + ${totalRevenue}">₹0.00</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card p-3 text-center">
                <span class="text-muted small text-uppercase">📺 Active Screens Configured</span>
                <h2 class="fw-bold text-primary mt-2" th:text="${#lists.size(screens)}">0</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card p-3 h-100 d-flex flex-column justify-content-center gap-2">
                <a th:href="@{/admin/screen/add}" class="btn btn-outline-primary btn-sm fw-bold">Configure New Screen (2D Grid)</a>
                <a th:href="@{/admin/show/add}" class="btn btn-outline-warning btn-sm fw-bold">Schedule Movie Show Timing</a>
                <a th:href="@{/admin/snack/add}" class="btn btn-outline-success btn-sm fw-bold">Add Canteen Snacks Item</a>
            </div>
        </div>
    </div>

    <div class="card bg-dark border-secondary p-4 mb-4" th:if="${not #lists.isEmpty(lowStockSnacks)}">
        <h5 class="fw-bold text-warning mb-3">⚠️ Canteen Low Stock Alerts (Refill Needed)</h5>
        <div class="row row-cols-1 row-cols-md-3 g-3">
            <div class="col" th:each="snack : ${lowStockSnacks}">
                <div class="card alert-card p-2 text-white">
                    <div class="fw-bold" th:text="${snack.snackName}"></div>
                    <small class="text-warning" th:text="'Only ' + ${snack.availableStock} + ' items left!'"></small>
                </div>
            </div>
        </div>
    </div>

    <div class="card bg-dark border-secondary p-4">
        <h5 class="fw-bold text-muted mb-3">Theater Infrastructure Matrix</h5>
        <div class="row g-3">
            <div class="col-md-4" th:each="scr : ${screens}">
                <div class="p-3 bg-secondary bg-opacity-25 rounded border border-secondary text-center">
                    <h5 class="fw-bold text-info" th:text="${scr.screenName}">Screen 1</h5>
                    <p class="mb-0 text-muted small" th:text="'Grid Setup: ' + ${scr.totalRows} + ' Rows x ' + ${scr.seatsPerRow} + ' Seats per row'"></p>
                    <span class="badge bg-dark mt-2" th:text="${scr.totalSeats} + ' Total Seats'"></span>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
