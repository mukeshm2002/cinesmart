<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CineSmart - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', sans-serif; }
        .login-card { background-color: #1e1e1e; border: 1px solid #2d2d2d; border-radius: 12px; }
        .btn-primary { background-color: #e50914; border: none; } /* Netflix Red Style */
        .btn-primary:hover { background-color: #b81d24; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

<div class="container" style="max-width: 450px;">
    <div class="card login-card p-4 shadow-lg">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-danger">🎬 CineSmart</h2>
            <p class="text-muted small">Smart Ticket Resale Platform</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger small py-2" role="alert">
            Invalid Email or Password!
        </div>
        <div th:if="${param.logout}" class="alert alert-success small py-2" role="alert">
            You have been logged out successfully.
        </div>
        <div th:if="${param.registered}" class="alert alert-success small py-2" role="alert">
            Registration successful! Please login here.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="email" class="form-label text-muted small">Email Address</label>
                <input type="email" class="form-control bg-dark text-white border-secondary" id="email" name="email" required placeholder="name@example.com">
            </div>
            <div class="mb-4">
                <label for="password" class="form-label text-muted small">Password</label>
                <input type="password" class="form-control bg-dark text-white border-secondary" id="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold mb-3">Sign In</button>
        </form>

        <div class="text-center mt-2 small">
            <span class="text-muted">New to CineSmart? </span>
            <a th:href="@{/register}" class="text-danger text-decoration-none fw-bold">Create an account</a>
        </div>
    </div>
</div>

</body>
</html>
