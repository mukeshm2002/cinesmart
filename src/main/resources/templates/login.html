<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | CineSmart</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?q=80&w=2069&auto=format&fit=crop');
            background-size: cover; background-position: center;
            color:#ffffff; font-family: 'Montserrat', sans-serif;
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }

        .login-card {
            background: rgba(17, 17, 17, 0.9); border: 1px solid #333;
            border-radius: 25px; padding: 50px; width: 100%; max-width: 450px;
            backdrop-filter: blur(10px); box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .form-control {
            background: #222 !important; border: 1px solid #444; color: color: #ffffff;
            border-radius: 12px; padding: 15px;
        }
        .form-control:focus { border-color: #e50914; box-shadow: none; }

        .btn-login {
            background: #e50914; color: white; padding: 15px;
            border-radius: 12px; font-weight: 700; transition: 0.3s; border: none;
        }
        .btn-login:hover { background: #ff0a16; transform: translateY(-2px); }

        .brand-text { font-size: 2rem; font-weight: 800; color: #e50914; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center mb-4">
        <div class="brand-text">CineSmart</div>
        <p class="text-secondary">Welcome back to the magic of cinema.</p>
    </div>

    <div th:if="${param.error}" class="alert alert-danger bg-transparent border-danger text-danger py-2 small">Invalid Email or Password!</div>
    <div th:if="${param.logout}" class="alert alert-success bg-transparent border-success text-success py-2 small">Logged out successfully.</div>
    <div th:if="${param.registered}" class="alert alert-success bg-transparent border-success text-success py-2 small">Account created! Please sign in.</div>

    <form th:action="@{/login}" method="post">
        <div class="mb-4">
            <label>Email</label>
            <input type="email" class="form-control" name="email" required placeholder="Email Address">
        </div>
        <div class="mb-4">
            <label>Password</label>
            <input type="password" class="form-control" name="password" required placeholder="Password">
        </div>
        <button type="submit" class="btn btn-login w-100">Sign In</button>
    </form>

    <div class="text-center mt-4 text-secondary">
        New here? <a th:href="@{/register}" class="text-white fw-bold text-decoration-none">Create an account</a>
    </div>
</div>

</body>
</html>
