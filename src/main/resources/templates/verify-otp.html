<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP | CineSmart</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=2025&auto=format&fit=crop');
            background-size: cover; background-position: center;
            color: #fff; font-family: 'Montserrat', sans-serif;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .otp-card {
            background: rgba(17, 17, 17, 0.95); border: 1px solid #333;
            border-radius: 25px; padding: 40px; width: 100%; max-width: 400px;
            text-align: center; backdrop-filter: blur(15px);
        }
        .form-control { background: #1a1a1a !important; border: 1px solid #444; color: white !important; border-radius: 12px; padding: 12px; text-align: center; font-size: 1.5rem; letter-spacing: 5px; }
        .btn-verify { background: #e50914; color: white; padding: 12px; border-radius: 12px; font-weight: 700; border: none; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

<div class="otp-card">
    <h4 class="fw-bold mb-3">Verify Your Email</h4>
    <p class="text-secondary small mb-4">We've sent a 6-digit OTP to your registered email address.</p>

    <div th:if="${error}" class="alert alert-danger py-2 small" th:text="${error}"></div>

    <form th:action="@{/verify-otp}" method="post">
        <input type="hidden" name="email" th:value="${email}">

        <div class="mb-3">
            <input type="text" name="otp" class="form-control" maxlength="6" required placeholder="000000">
        </div>

        <button type="submit" class="btn btn-verify">Verify OTP</button>
    </form>
</div>

</body>
</html>
