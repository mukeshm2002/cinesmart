<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP | CineSmart</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=2025&auto=format&fit=crop');
            background-size: cover; background-position: center;
            color: #fff; font-family: 'Montserrat', sans-serif;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .otp-card {
            background: rgba(10, 10, 10, 0.9); border: 1px solid #333;
            border-radius: 25px; padding: 40px; width: 100%; max-width: 400px;
            text-align: center; backdrop-filter: blur(10px); box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .form-control {
            background: #1a1a1a !important; border: 1px solid #444; color: white !important;
            border-radius: 12px; padding: 15px; text-align: center; font-size: 1.8rem;
            letter-spacing: 10px; font-weight: 700;
        }
        .form-control:focus { border-color: #e50914; box-shadow: 0 0 0 0.2rem rgba(229, 9, 20, 0.25); }
        .btn-verify {
            background: #e50914; color: white; padding: 14px; border-radius: 12px;
            font-weight: 700; border: none; width: 100%; margin-top: 20px; transition: 0.3s;
        }
        .btn-verify:hover { background: #ff0a16; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="otp-card">
    <h4 class="fw-bold mb-3">Verify Your Email</h4>
    <p class="text-secondary small mb-4">We've sent a 6-digit OTP to your registered email address.</p>

    <div th:if="${error}" class="alert alert-danger py-2 small mb-3" th:text="${error}"></div>

    <form th:action="@{/verify-otp}" method="post" id="otpForm" onsubmit="this.querySelector('button').disabled=true; this.querySelector('button').innerText='Verifying...';">
        <input type="hidden" name="email" th:value="${email}">

        <div class="mb-3">
            <input type="number" name="otp" class="form-control" maxlength="6" required
                   placeholder="000000" autofocus inputmode="numeric">
        </div>

        <button type="submit" class="btn btn-verify">Verify OTP</button>
    </form>
</div>

</body>
</html>
