spring.application.name=cinesmart

# =========================================================================
# DATASOURCE CONFIGURATION (NEON POSTGRESQL - ENVS DRIVEN)
# =========================================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================================================================
# JPA / HIBERNATE PROPERTIES
# =========================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# =========================================================================
# CLOUDINARY CONFIGURATION (ENVS DRIVEN)
# =========================================================================
cloudinary.cloud_name=${CLOUDINARY_NAME}
cloudinary.api_key=${CLOUDINARY_KEY}
cloudinary.api_secret=${CLOUDINARY_SECRET}

# Gmail ?????????? ????????????, ????? ???????????:
spring.mail.host=smtp.sendgrid.net
spring.mail.port=587
spring.mail.username=apikey
spring.mail.password=${SENDGRID_API_KEY}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

server.port=8080

logging.level.org.hibernate.orm.query.hql=DEBUG
logging.level.org.hibernate.SQL=DEBUG